<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Gallery — theme-factory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f13;
      --surface: #18181f;
      --border:  #2a2a38;
      --text:    #d4d4e8;
      --muted:   #6b6b88;
      --accent:  #7c7cff;
      --radius:  8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      padding: 2.5rem 2rem 4rem;
      min-height: 100vh;
    }

    header {
      max-width: 960px;
      margin: 0 auto 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 0.35rem;
    }

    header p { color: var(--muted); font-size: 0.875rem; }

    #count {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 0.1rem 0.6rem;
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    /* ── Filters ── */
    #filters {
      max-width: 960px;
      margin: 0 auto 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      min-width: 36px;
      flex-shrink: 0;
    }

    .filter-divider {
      width: 1px;
      height: 14px;
      background: var(--border);
      flex-shrink: 0;
    }

    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      flex: 1;
    }

    .chip {
      padding: 0.18rem 0.65rem;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.73rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
      font-family: inherit;
      line-height: 1.6;
    }

    .chip:hover { border-color: var(--accent); color: var(--text); }

    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .chip-light.active { background: #c8c8ff; border-color: #c8c8ff; color: #1a1a3a; }
    .chip-dark.active  { background: #2a2a50; border-color: var(--accent); color: #fff; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .preview {
      height: 120px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .mockup {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 14px;
      gap: 7px;
    }

    .mockup-bar  { height: 10px; border-radius: 3px; opacity: 0.9; }
    .mockup-row  { display: flex; gap: 6px; align-items: center; }
    .mockup-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .mockup-line { height: 6px; border-radius: 3px; flex: 1; }
    .mockup-btn  { height: 16px; border-radius: 3px; width: 48px; flex-shrink: 0; }

    .mockup { opacity: 0.18; }

    .preview-font {
      position: absolute;
      inset: 0 0 6px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      z-index: 2;
      pointer-events: none;
    }

    .preview-font span {
      font-size: 1.6rem;
      line-height: 1.15;
      text-align: center;
      word-break: break-word;
      max-width: 100%;
      letter-spacing: -0.01em;
    }

    .swatches {
      display: flex;
      height: 6px;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
    }

    .swatch { flex: 1; }

    .card-body {
      padding: 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .card-name { font-weight: 600; font-size: 0.9rem; color: #fff; letter-spacing: -0.01em; }
    .card-desc  { font-size: 0.78rem; color: var(--muted); line-height: 1.5; flex: 1; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.6rem;
    }

    .card-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; }

    .tag {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      border: 1px solid;
      opacity: 0.85;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .tag:hover { opacity: 1; transform: translateY(-1px); }

    .open-link {
      font-size: 0.75rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .open-link svg { width: 11px; height: 11px; }

    .fav-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      border: none;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
      color: rgba(255,255,255,0.55);
      padding: 0;
      flex-shrink: 0;
    }
    .card:hover .fav-btn { opacity: 1; }
    .fav-btn.active { opacity: 1; color: #FFD700; background: rgba(0,0,0,0.5); }
    .fav-btn:hover { background: rgba(0,0,0,0.55); color: #FFD700; }

    .fav-pin {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #FFD700;
      background: rgba(255,215,0,0.12);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 3px;
      padding: 0.1rem 0.35rem;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    #empty-msg {
      display: none;
      max-width: 960px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 2rem 0;
      text-align: center;
    }
  </style>
</head>

  const grid     = document.getElementById('grid');
  const countEl  = document.getElementById('count');
  const emptyMsg = document.getElementById('empty-msg');

  let allEntries  = [];
  let activeMode = '';
  let activeVibe = '';
  let favorites   = new Set(JSON.parse(localStorage.getItem('theme-fav') || '[]'));

  /* ── Colour helpers ── */
  function hex(c) { return c && /^#/.test(c.trim()) ? c.trim() : '#888'; }

  function parseFontName(stack) {
    if (!stack) return '';
    return stack.split(',')[0].trim().replace(/['"]/g, '');
  }

  function hexToHsl(h) {
    const r = parseInt(h.slice(1,3),16)/255;
    const g = parseInt(h.slice(3,5),16)/255;
    const b = parseInt(h.slice(5,7),16)/255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    let hue = 0, sat = 0;
    const lig = (max+min)/2;
    if (max !== min) {
      const d = max - min;
      sat = lig > 0.5 ? d/(2-max-min) : d/(max+min);
      switch(max) {
        case r: hue = ((g-b)/d + (g<b?6:0)) / 6; break;
        case g: hue = ((b-r)/d + 2) / 6; break;
        case b: hue = ((r-g)/d + 4) / 6; break;
      }
    }
    return { h: hue*360, s: sat*100, l: lig*100 };
  }

  /* ── Sort: favorites pinned first, then A–Z by theme name ── */
  function sortEntries(entries) {
    return [...entries].sort((a, b) => {
      const aFav = favorites.has(a.filename);
      const bFav = favorites.has(b.filename);
      if (aFav !== bFav) return aFav ? -1 : 1;
      const aName = (a.theme.name || a.filename).toLowerCase();
      const bName = (b.theme.name || b.filename).toLowerCase();
      return aName.localeCompare(bName);
    });
  }

  /* ── Card builder ── */
  function buildCard(entry) {
    const { theme, filename, bg, p, sec, acc, sur, txt, mode, tags } = entry;
    const typo = theme.typography || {};
    const fx   = theme.effects  || {};
    const grad = theme.gradients || {};
    const fontFamily    = typo.fontFamilyDisplay || typo.fontFamily || 'inherit';
    const fontName      = parseFontName(fontFamily);
    const headingWeight = typo.headingWeight || '700';
    const displayLabel  = (theme.name || filename.replace('themes/','').replace('.html',''))
      .replace(/-/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());

    const textGrad   = grad.text && grad.text !== 'none' ? grad.text : null;
    const textShadow = fx.textShadow && fx.textShadow !== 'none' ? fx.textShadow : null;

    let spanStyle = `font-family:${fontFamily};font-weight:${headingWeight};`;
    if (textGrad) {
      spanStyle += `background:${textGrad};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;`;
      if (textShadow) spanStyle += `filter:drop-shadow(0 0 6px ${p}88);`;
    } else {
      spanStyle += `color:${p};`;
      if (textShadow) spanStyle += `text-shadow:${textShadow};`;
    }

    const RAW_BASE = 'https://raw.githubusercontent.com/PakawatPanyakorn/.claude/master/skills/theme-factory/';
    const PREVIEW_BASE = 'https://html-preview.github.io/?url=';
    const card = document.createElement('a');
    card.className = 'card';
    card.href = PREVIEW_BASE + RAW_BASE + filename;
    card.target = '_blank';

    const isFav = favorites.has(filename);
    card.innerHTML = `
      <div class="preview" style="background:${bg}">
        <button class="fav-btn${isFav ? ' active' : ''}" data-filename="${filename}" title="Favorite">★</button>
        <div class="mockup">
          <div class="mockup-bar" style="background:${p};width:55%"></div>
          <div class="mockup-row">
            <div class="mockup-dot" style="background:${acc}"></div>
            <div class="mockup-line" style="background:${sur}"></div>
          </div>
          <div class="mockup-row">
            <div class="mockup-dot" style="background:${sec}"></div>
            <div class="mockup-line" style="background:${sur};width:55%"></div>
          </div>
          <div class="mockup-row">
            <div class="mockup-dot" style="background:${txt};opacity:.4"></div>
            <div class="mockup-line" style="background:${sur};width:65%"></div>
          </div>
          <div class="mockup-row" style="margin-top:auto">
            <div class="mockup-btn" style="background:${p}"></div>
            <div class="mockup-btn" style="background:${sur}"></div>
          </div>
        </div>
        <div class="preview-font" title="${fontName}"><span style="${spanStyle}">${displayLabel}</span></div>
        <div class="swatches">
          <div class="swatch" style="background:${p}"></div>
          <div class="swatch" style="background:${sec}"></div>
          <div class="swatch" style="background:${acc}"></div>
          <div class="swatch" style="background:${sur}"></div>
          <div class="swatch" style="background:${txt}"></div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-name">${theme.name || filename.replace('themes/','').replace('.html','')}${isFav ? '<span class="fav-pin">★ pinned</span>' : ''}</div>
        <div class="card-desc">${theme.description || ''}</div>
        <div class="card-footer">
          <div class="card-tags">${tags.map(t => { const c = TAG_COLORS[t] || {}; return `<span class="tag" data-tag="${t}" style="color:${c.fg||'#aaa'};background:${c.bg||'transparent'};border-color:${c.border||'#aaa4'}">${t}</span>`; }).join('')}</div>
          <span class="open-link">open
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M2 10L10 2M5 2h5v5"/>
            </svg>
          </span>
        </div>
      </div>`;

    return card;
  }

  /* ── Render filtered + sorted entries ── */
  function render() {
    const filtered = allEntries.filter(e => {
      if (activeMode && e.mode !== activeMode) return false;
      if (activeVibe && !e.tags.includes(activeVibe)) return false;
      return true;
    });

    grid.innerHTML = '';
    filtered.forEach(e => grid.appendChild(buildCard(e)));

    const total = allEntries.length;
    countEl.textContent = filtered.length === total
      ? `${total} theme${total !== 1 ? 's' : ''}`
      : `${filtered.length} / ${total}`;

    emptyMsg.style.display = filtered.length === 0 ? 'block' : 'none';
  }

  /* ── Filter chips wiring ── */
  function wireChips(containerId, onChange) {
    const container = document.getElementById(containerId);
    container.addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      const value = chip.dataset.value;
      if (chip.classList.contains('active') && value !== '') {
        container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        container.querySelector('[data-value=""]')?.classList.add('active');
        onChange('');
        return;
      }
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      onChange(value);
    });
  }

  /* ── Tag click → set vibe filter ── */
  grid.addEventListener('click', e => {
    const tag = e.target.closest('.tag');
    if (!tag) return;
    e.preventDefault();
    e.stopPropagation();
    const value = tag.dataset.tag;
    activeVibe = (activeVibe === value) ? '' : value;
    document.querySelectorAll('#filter-vibe .chip').forEach(c => {
      c.classList.toggle('active', c.dataset.value === activeVibe);
    });
    render();
  });

  /* ── Favorite toggle — event delegation on grid ── */
  grid.addEventListener('click', e => {
    const btn = e.target.closest('.fav-btn');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    const filename = btn.dataset.filename;
    if (favorites.has(filename)) {
      favorites.delete(filename);
    } else {
      favorites.add(filename);
    }
    localStorage.setItem('theme-fav', JSON.stringify([...favorites]));
    allEntries = sortEntries(allEntries);
    render();
  });

  wireChips('filter-tone', v => { activeMode = v; render(); });

  wireChips('filter-vibe', v => { activeVibe = v; render(); });

  /* ── Build style filter chips from loaded data ── */
  function buildVibeChips() {
    const container = document.getElementById('filter-vibe');
    TAG_ORDER.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.dataset.value = tag;
      btn.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
      container.appendChild(btn);
    });
  }

  /* ── Load all display fonts from Google Fonts ── */
  function loadDisplayFonts() {
    const SYSTEM = new Set(['system-ui','-apple-system','blinkmacsystemfont','segoe ui',
      'helvetica neue','arial','sans-serif','serif','monospace','georgia','impact','inherit']);
    const seen = new Set();
    const params = [];

    for (const { data: theme } of THEMES) {
      const stack = (theme.typography?.fontFamilyDisplay || theme.typography?.fontFamily || '');
      const name  = stack.split(',')[0].trim().replace(/['"]/g, '');
      if (!name || seen.has(name) || SYSTEM.has(name.toLowerCase())) continue;
      seen.add(name);
      params.push(`family=${encodeURIComponent(name)}:wght@400;700;800;900`);
    }

    if (!params.length) return;
    const link = document.createElement('link');
    link.rel  = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?${params.join('&')}&display=swap`;
    document.head.appendChild(link);
  }

  /* ── Init — processes inline THEMES array, no fetch needed ── */
  function init() {
    loadDisplayFonts();
    for (const { filename, data: theme } of THEMES) {
      const c   = theme.colors || {};
      const bg  = hex(c.background);
      const p   = hex(c.primary);
      const sec = hex(c.secondary || c.accent || c.primary);
      const acc = hex(c.accent    || c.secondary || c.primary);
      const sur = hex(c.surface   || c.background);
      const txt = hex(c.text || '#888');

      const ri = parseInt(bg.slice(1,3),16);
      const gi = parseInt(bg.slice(3,5),16);
      const bi = parseInt(bg.slice(5,7),16);
      const lum = (0.299*ri + 0.587*gi + 0.114*bi) / 255;
      const mode = lum < 0.4 ? 'dark' : 'light';

      const { h: hue } = hexToHsl(bg);
      const tags = THEME_TAGS[filename] || [mode];

      allEntries.push({ theme, filename, bg, p, sec, acc, sur, txt, lum, hue, mode, tags });
    }

    allEntries = sortEntries(allEntries);  // favorites first, then A–Z
    buildVibeChips();

    countEl.textContent = `${allEntries.length} theme${allEntries.length !== 1 ? 's' : ''}`;
    render();
  }

  init();
</script>

</body>
</html>
